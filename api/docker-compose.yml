version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - EASTLAKE_ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - EASTLAKE_GITHUB_TOKEN=${GITHUB_TOKEN}
      - EASTLAKE_ADMIN_API_KEY=${ADMIN_API_KEY}
      - EASTLAKE_DEBUG=false
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Optional: Add a reverse proxy with nginx for production
  # nginx:
  #   image: nginx:latest
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api