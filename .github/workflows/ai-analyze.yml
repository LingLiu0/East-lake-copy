name: AI Document Analysis

on:
  push:
    branches: [main]
    paths:
      - 'research/**/*.md'
  pull_request:
    paths:
      - 'research/**/*.md'
  workflow_dispatch:
    inputs:
      file:
        description: 'Specific file to analyze'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Changed Files
        id: files
        run: |
          if [[ "${{ github.event.inputs.file }}" != "" ]]; then
            echo "files=${{ github.event.inputs.file }}" >> $GITHUB_OUTPUT
            echo "trigger=single" >> $GITHUB_OUTPUT
          else
            if [[ "${{ github.event_name }}" == "push" ]]; then
              changes=$(git diff --name-only HEAD~1 HEAD -- 'research/**/*.md' 2>/dev/null || echo "")
            elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
              changes=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- 'research/**/*.md' 2>/dev/null || echo "")
            fi
            echo "files=$changes" >> $GITHUB_OUTPUT
            echo "trigger=batch" >> $GITHUB_OUTPUT
          fi

      - name: Read File Content
        id: content
        if: steps.files.outputs.trigger == 'single'
        run: |
          content=$(cat "${{ github.event.inputs.file }}" 2>/dev/null || echo "")
          content="${content//'%'/'%25'}"
          content="${content//$'\n'/'%0A'}"
          content="${content//$'\r'/'%0D'}"
          echo "content=$content" >> $GITHUB_OUTPUT
          filename=$(basename "${{ github.event.inputs.file }}" .md)
          echo "filename=$filename" >> $GITHUB_OUTPUT

      - name: AI Analysis
        id: ai
        if: steps.files.outputs.trigger == 'single'
        uses: anthropics/claude-action@main
        continue-on-error: true
        with:
          api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          prompt: |
            分析以下研究文档，提取关键信息并以 JSON 格式返回分析结果。

            文档内容:
            ${{ steps.content.outputs.content }}

            返回格式（只返回 JSON，不要其他内容）:
            {
              "category": "政策解读|技术分析|专项课题|领导拜访|行业研究|其他",
              "summary": "50字以内的摘要",
              "key_points": ["要点1", "要点2", "要点3"],
              "tags": ["tag1", "tag2", "tag3"],
              "faq": [{"question": "问题", "answer": "答案"}],
              "related_concepts": ["相关概念1", "相关概念2"],
              "insights": "50字以内的洞察或建议"
            }

      - name: Parse Single File Analysis
        id: parse-single
        if: steps.ai.outcome == 'success' && steps.files.outputs.trigger == 'single'
        run: |
          response='${{ steps.ai.outputs.response }}'
          json=$(echo "$response" | grep -o '{.*}' | tail -1)

          category=$(echo "$json" | jq -r '.category // "其他"')
          summary=$(echo "$json" | jq -r '.summary // ""')
          key_points=$(echo "$json" | jq -r '.key_points | join("\\\\n") // ""')
          tags=$(echo "$json" | jq -r '.tags | join(",") // ""')
          insights=$(echo "$json" | jq -r '.insights // ""')

          echo "category=$category" >> $GITHUB_OUTPUT
          echo "summary=$summary" >> $GITHUB_OUTPUT
          echo "key_points=$key_points" >> $GITHUB_OUTPUT
          echo "tags=$tags" >> $GITHUB_OUTPUT
          echo "insights=$insights" >> $GITHUB_OUTPUT

      - name: Update Front Matter
        id: update-fm
        if: steps.parse-single.outcome == 'success'
        run: |
          file="${{ github.event.inputs.file }}"
          filename=$(basename "$file" .md)

          # Read file content
          content=$(cat "$file")

          # Remove existing AI分析 front matter if present
          content=$(echo "$content" | sed '/^ai_analysis:$/,/^---$/d')

          # Add AI analysis section
          ai_section="---
ai_analysis:
  category: ${{ steps.parse-single.outputs.category }}
  summary: ${{ steps.parse-single.outputs.summary }}
  insights: ${{ steps.parse-single.outputs.insights }}
  analyzed_at: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
---"

          # Insert after existing front matter
          if echo "$content" | head -1 | grep -q "^---"; then
            # Find second --- and insert after it
            first_part=$(echo "$content" | sed -n '/^---/!{p;q}')
            rest=$(echo "$content" | sed '1,/^---/d')
            new_content="$first_part
---
$ai_section

$rest"
          else
            new_content="$ai_section

$content"
          fi

          echo "$new_content" > "$file"

      - name: Batch Analysis
        id: batch
        if: steps.files.outputs.trigger == 'batch' && steps.files.outputs.files != ''
        run: |
          echo "Files to analyze:"
          echo "${{ steps.files.outputs.files }}" | tr ' ' '\n'

          # For batch processing, create a summary
          echo "batch_analysis=true" >> $GITHUB_OUTPUT
          file_count=$(echo "${{ steps.files.outputs.files }}" | wc -w)
          echo "count=$file_count" >> $GITHUB_OUTPUT

      - name: Create Analysis Report
        if: steps.batch.outcome == 'success'
        run: |
          mkdir -p reports
          date_str=$(date '+%Y-%m-%d')

          cat > "reports/analysis-${date_str}.md" << 'EOF'
# 文档分析报告

## 分析概览

- **分析时间**: $(date -u +'%Y-%m-%d %H:%M:%S')
- **触发类型**: ${{ steps.files.outputs.trigger }}
- **文件数量**: ${{ steps.batch.outputs.count }}

## 分析文件

${{ steps.files.outputs.files }}

---
*由 AI 自动生成*
EOF

      - name: Commit Changes
        if: steps.update-fm.outcome == 'success' || steps.batch.outcome == 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "ai: update document analysis $(date '+%Y-%m-%d')"
          git push