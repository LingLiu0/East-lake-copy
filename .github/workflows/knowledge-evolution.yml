name: Knowledge Auto Evolution

on:
  schedule:
    # 每周六北京时间 20:00 (UTC 12:00) 执行知识库演化
    - cron: '0 12 * * 6'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Evolution mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - analyze
          - suggest

permissions:
  contents: write
  issues: write

jobs:
  analyze-knowledge-base:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Analyze Knowledge Structure
        id: analysis
        run: |
          # 统计文档数量
          total_docs=$(find . -name "*.md" -not -path "./.git/*" | wc -l)

          # 统计链接
          total_links=$(grep -rE '\[\[([^\]]+)\]\]' . --include="*.md" 2>/dev/null | wc -l)

          # 统计标签
          tag_count=$(grep -rE '^tags:' . --include="*.md" | wc -l)

          # 类别分布
          concepts=$(find ./concepts -name "*.md" 2>/dev/null | wc -l)
          decisions=$(find ./decisions -name "*.md" 2>/dev/null | wc -l)
          meetings=$(find ./meetings -name "*.md" 2>/dev/null | wc -l)
          research=$(find ./research -name "*.md" 2>/dev/null | wc -l)

          echo "total_docs=$total_docs" >> $GITHUB_OUTPUT
          echo "total_links=$total_links" >> $GITHUB_OUTPUT
          echo "tag_count=$tag_count" >> $GITHUB_OUTPUT
          echo "concepts=$concepts" >> $GITHUB_OUTPUT
          echo "decisions=$decisions" >> $GITHUB_OUTPUT
          echo "meetings=$meetings" >> $GITHUB_OUTPUT
          echo "research=$research" >> $GITHUB_OUTPUT

      - name: Find Orphaned Documents
        id: orphaned
        run: |
          # 找出没有被任何文档链接的文档
          all_links=$(grep -rE '\[\[([^\]|]+)(?:\|[^\]]+)?\]\]' . --include="*.md" 2>/dev/null | sed 's/.*\[\[\([^\]|]*\).*/\1/' | sort -u)

          find . -name "*.md" -not -path "./.git/*" | while read file; do
            stem=$(basename "$file" .md)
            if ! echo "$all_links" | grep -q "^$stem$"; then
              # 检查是否在重要目录
              if [[ "$file" == *"/concepts/"* ]] || [[ "$file" == *"/decisions/"* ]]; then
                echo "$file"
              fi
            fi
          done > orphaned.txt

          orphan_count=$(wc -l < orphaned.txt || echo 0)
          echo "orphan_count=$orphan_count" >> $GITHUB_OUTPUT

      - name: Find Unlinked References
        id: broken-links
        run: |
          # 找出链接指向不存在的文档
          all_files=$(find . -name "*.md" -not -path "./.git/*" | xargs -I{} basename {} .md | sort -u)

          grep -rE '\[\[([^\]|]+)(?:\|[^\]]+)?\]\]' . --include="*.md" 2>/dev/null | \
            sed 's/.*\[\[\([^\]|]*\).*/\1/' | sort -u | while read link; do
              if ! echo "$all_files" | grep -q "^$link$"; then
                echo "$link"
              fi
            done > broken_links.txt

          broken_count=$(wc -l < broken_links.txt || echo 0)
          echo "broken_count=$broken_count" >> $GITHUB_OUTPUT

      - name: Suggest Missing Links
        id: link-suggestions
        run: |
          # 基于标签相似性建议链接
          echo "# 链接建议" > link_suggestions.md

          # 找出有相同标签的文档对
          for tag in $(grep -rE '^tags:' . --include="*.md" | sed 's/.*tags: \[//;s/\]//;s/,/\n/g' | sed 's/[" ]//g' | grep -v '^$' | sort -u | head -20); do
            docs_with_tag=$(grep -l "tags:.*$tag" . --include="*.md" -r | xargs -I{} basename {} .md | head -5)

            doc_count=$(echo "$docs_with_tag" | wc -l)
            if [ "$doc_count" -ge 2 ]; then
              echo "" >> link_suggestions.md
              echo "## 标签: $tag" >> link_suggestions.md
              echo "" >> link_suggestions.md
              for doc in $docs_with_tag; do
                echo "- [[$doc]]" >> link_suggestions.md
              done
            fi
          done

      - name: AI Evolution Analysis
        id: ai-analysis
        if: env.ANTHROPIC_API_KEY != ''
        uses: anthropics/claude-action@main
        continue-on-error: true
        with:
          api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-sonnet-4-20250514
          prompt: |
            你是一个知识管理专家。请分析以下知识库的结构，并提出演化建议。

            知识库统计：
            - 总文档数: ${{ steps.analysis.outputs.total_docs }}
            - 总链接数: ${{ steps.analysis.outputs.total_links }}
            - 概念数: ${{ steps.analysis.outputs.concepts }}
            - 决策数: ${{ steps.analysis.outputs.decisions }}
            - 会议数: ${{ steps.analysis.outputs.meetings }}
            - 研究数: ${{ steps.analysis.outputs.research }}
            - 孤立文档: ${{ steps.orphaned.outputs.orphan_count }}
            - 断开的链接: ${{ steps.broken-links.outputs.broken_count }}

            请返回 JSON 格式的分析结果：
            {
              "health_score": 0-100,
              "status": "健康/需要关注/需要干预",
              "structure_issues": ["问题1", "问题2"],
              "evolution_suggestions": [
                {"action": "创建索引页", "reason": "原因", "priority": "high/medium/low"}
              ],
              "content_gaps": ["可能缺失的主题1", "可能缺失的主题2"],
              "recommended_refactors": ["建议重构1", "建议重构2"]
            }

      - name: Parse AI Analysis
        id: parse
        if: steps.ai-analysis.outcome == 'success'
        run: |
          response='${{ steps.ai-analysis.outputs.response }}'
          json=$(echo "$response" | grep -oP '(?<=```json\n)[\s\S]*?(?=```)' | tail -1 || echo "$response" | grep -o '{.*}' | tail -1)

          health=$(echo "$json" | jq -r '.health_score // 50' 2>/dev/null || echo "50")
          status=$(echo "$json" | jq -r '.status // "分析中"' 2>/dev/null || echo "分析中")

          echo "health=$health" >> $GITHUB_OUTPUT
          echo "status=$status" >> $GITHUB_OUTPUT
          echo "analysis=$json" >> $GITHUB_OUTPUT

      - name: Generate Evolution Report
        run: |
          mkdir -p reports
          date_str=$(date '+%Y-%m-%d')

          health="${health:-50}"
          status="${status:-分析中}"

          if [ "$health" -ge 80 ]; then
            emoji="✅"
          elif [ "$health" -ge 50 ]; then
            emoji="⚠️"
          else
            emoji="🔴"
          fi

          cat > "reports/evolution-${date_str}.md" << EOF
          # 🧬 知识库演化报告

          > 生成时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

          ## 健康度评估

          $emoji **健康度**: $health/100
          **状态**: $status

          ## 统计概览

          | 指标 | 数值 |
          |------|------|
          | 总文档 | ${{ steps.analysis.outputs.total_docs }} |
          | 总链接 | ${{ steps.analysis.outputs.total_links }} |
          | 概念 | ${{ steps.analysis.outputs.concepts }} |
          | 决策 | ${{ steps.analysis.outputs.decisions }} |
          | 会议 | ${{ steps.analysis.outputs.meetings }} |
          | 研究 | ${{ steps.analysis.outputs.research }} |
          | 孤立文档 | ${{ steps.orphaned.outputs.orphan_count }} |
          | 断开链接 | ${{ steps.broken-links.outputs.broken_count }} |

          ## 链接建议

          $(cat link_suggestions.md 2>/dev/null || echo "无")

          ## 修复建议

          ### 断开链接修复
          $(cat broken_links.txt 2>/dev/null | head -10 | sed 's/^/- [[]] @/g' || echo "无")

          ### 孤立文档处理
          $(cat orphaned.txt 2>/dev/null | head -10 | sed 's|.*/|  - |g' || echo "无")

          ---
          *由 Knowledge Auto Evolution 自动生成*
          EOF

      - name: Create Action Items
        if: steps.parse.outcome == 'success'
        run: |
          # 基于分析创建 Issue
          analysis='${{ steps.parse.outputs.analysis }}'

          # 提取建议
          suggestions=$(echo "$analysis" | jq -r '.evolution_suggestions[] | "\(.action): \(.reason)"' 2>/dev/null || echo "")

          if [ -n "$suggestions" ]; then
            body="## 🧬 知识库演化建议

            健康度: ${{ steps.parse.outputs.health }}/100
            状态: ${{ steps.parse.outputs.status }}

            ### 建议行动

            $suggestions

            ---
            *由 AI 自动生成*"

            gh issue create \
              --title "🧬 知识库演化建议 - $(date '+%Y-%m-%d')" \
              --body "$body" \
              --label "evolution,suggestion"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix Broken Links
        if: steps.broken-links.outputs.broken_count > 0
        run: |
          # 自动修复明显的链接错误
          # 例如：将 [[foo-bar]] 链接到实际存在的 [[foo-bar]] 文档

          # 这是一个保守的自动修复
          # 只会修复完全匹配的错误

          echo "发现 ${{ steps.broken-links.outputs.broken_count }} 个可能断开的链接"
          echo "请手动检查并修复，或运行 --suggest 模式获取建议"

      - name: Commit Report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ link_suggestions.md 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: update knowledge evolution report $(date '+%Y-%m-%d')"
          git push