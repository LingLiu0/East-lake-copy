name: Auto Evolve
on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'outputs/qa/**'

permissions:
  contents: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 anthropic PyPDF2 python-docx
      - run: python scripts/auto_evolve.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE: ${{ secrets.API_BASE }}
          MODEL: ${{ secrets.MODEL }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: auto evolve $(date '+%Y-%m-%d')"
          git push