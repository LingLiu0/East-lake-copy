name: Auto Compile
on:
  push:
    branches: [master]
    paths:
      - 'raw/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 PyPDF2 python-docx
      - name: Compile knowledge base
        env:
          API_KEY: ${{ secrets.API_KEY }}
          API_BASE: ${{ secrets.API_BASE }}
          MODEL: ${{ secrets.MODEL }}
        run: python scripts/obsidian.py ai compile
      - name: Update index
        run: python scripts/obsidian.py ai index
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: auto compile $(date '+%Y-%m-%d')"
          git push