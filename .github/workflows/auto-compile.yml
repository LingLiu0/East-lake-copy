# Auto Compile Workflow

> 当 raw/ 目录有新文件时，自动编译知识库

name: Auto Compile

on:
  push:
    branches: [master]
    paths:
      - 'raw/**/*.md'
      - 'raw/**/*.txt'
      - 'raw/**/*.pdf'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 anthropic PyPDF2 python-docx

      - name: Compile knowledge base
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/obsidian.py ai compile

      - name: Update index
        run: |
          python scripts/obsidian.py ai index

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "ci: auto compile knowledge base $(date '+%Y-%m-%d')"
          git push

      - name: Create summary
        if: github.event_name == 'push'
        run: |
          echo "## 编译完成" >> $GITHUB_STEP_SUMMARY
          echo "- 已编译 raw/ 中的新文件" >> $GITHUB_STEP_SUMMARY
          echo "- 已更新 wiki/index.md" >> $GITHUB_STEP_SUMMARY